services:
  - type: web
    name: sobha-surendran-thumbnail-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: IG_BUSINESS_ACCOUNT_ID
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: CACHE_TTL_HOURS
        value: "12"
      - key: VIEWS_CACHE_TTL_HOURS
        value: "6"
      - key: NEWS_SEARCH_QUERY
        value: "Sobha Surendran"
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_USERNAME
        value: "SobhaBJP"
      - key: NEWSROOM_CACHE_TTL_HOURS
        value: "1"
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
